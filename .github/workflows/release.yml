name: Release

# Triggers on version tags: v2.0.0, v2.1.0, v2.0.0-rc.1, etc.
# Push the tag AFTER pubspec.yaml is updated on main:
#   git tag v2.0.0
#   git push origin v2.0.0
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# OIDC trusted publishing — no stored tokens or PATs required.
# pub.dev trusted publishing must be configured at:
#   https://pub.dev/packages/trusted_time/admin → "Automated publishing"
# Set GitHub repository: Sahad2701/trusted_time, tag pattern: v*.*.*
permissions:
  id-token: write   # Required for OIDC trusted publishing to pub.dev
  contents: write   # Required to create GitHub Releases

jobs:
  # ── Step 1: Full validation (same matrix as CI) ─────────────────────────────
  validate:
    name: Release / validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze --fatal-infos
      - run: flutter test

  # ── Step 2: Verify tag matches pubspec version ───────────────────────────────
  verify-version:
    name: Release / verify-version
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches pubspec.yaml version
        id: check
        run: |
          PUBSPEC_VER=$(grep '^version: ' pubspec.yaml | sed 's/version: //')
          echo "pubspec version: $PUBSPEC_VER"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            TAG="${GITHUB_REF_NAME}"           # e.g. v2.0.0
            TAG_VER="${TAG#v}"                  # strip leading 'v'
            echo "Tag version:     $TAG_VER"
            if [ "$TAG_VER" != "$PUBSPEC_VER" ]; then
              echo "::error::Tag ($TAG_VER) does not match pubspec.yaml version ($PUBSPEC_VER)."
              echo "Update pubspec.yaml and merge to main before tagging."
              exit 1
            fi
          fi
          echo "version=$PUBSPEC_VER" >> "$GITHUB_OUTPUT"

  # ── Step 3: Create GitHub Release with auto-generated notes ─────────────────
  github-release:
    name: Release / github-release
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for release notes

      - name: Extract changelog section for this version
        id: changelog
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          # Extract the block for this version from CHANGELOG.md. 
          # Supports both '## 2.0.0' and '## [2.0.0]' formats.
          NOTES=$(awk "/^## \[?$VERSION\]?$/,/^## \[?[0-9]/{if(/^## \[?[0-9]/ && !/^## \[?$VERSION\]?$/) exit; print}" CHANGELOG.md | tail -n +2)
          echo "notes<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.verify-version.outputs.version }}"
          name: "TrustedTime v${{ needs.verify-version.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(needs.verify-version.outputs.version, '-') }}  # rc/alpha/beta → pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Step 4: Publish to pub.dev via OIDC (no stored tokens) ──────────────────
  publish:
    name: Release / publish
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get

      - name: Publish to pub.dev (OIDC trusted publishing)
        run: dart pub publish --force
