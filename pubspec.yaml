name: trusted_time
description: Tamper-proof network time for Flutter. Anchored to hardware monotonic clocks with optional NTS (RFC 8915) to prevent system-time manipulation and network-level spoofing.
version: 2.0.1
homepage: https://github.com/Sahad2701/trusted_time
repository: https://github.com/Sahad2701/trusted_time
issue_tracker: https://github.com/Sahad2701/trusted_time/issues
documentation: https://pub.dev/documentation/trusted_time/latest/

topics:
  - time
  - ntp
  - security
  - anti-fraud
  - tamper-proof

environment:
  sdk: ^3.0.0
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter
  http: ">=1.0.0 <2.0.0"
  flutter_secure_storage: ^9.0.0
  ntp: ^2.0.0
  web: ">=0.5.0 <2.0.0"
  flutter_web_plugins:
    sdk: flutter
  timezone: ">=0.9.0 <1.0.0"
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.trustedtime.trusted_time
        pluginClass: TrustedTimePlugin
      ios:
        pluginClass: TrustedTimePlugin
      macos:
        pluginClass: TrustedTimePlugin
      windows:
        pluginClass: TrustedTimePlugin
      linux:
        pluginClass: TrustedTimePlugin
      web:
        pluginClass: TrustedTimeWebPlugin
        fileName: trusted_time_web.dart
